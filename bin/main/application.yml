spring:
  application:
    name: project_final_backend1
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB
  datasource:
    url: jdbc:mariadb://localhost:3306/today_fridge
    username: root
    password: 1234
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    open-in-view: false
