spring:
  application:
    name: project_final_backend1
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/today_fridge}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false

server:
  port: 8080

app:
  security:
    jwt:
      secret: 'VG9kYXlGcmlkZ2VQcm9qZWN0QmFja2VuZDFTdGFydGVyU2VjcmV0S2V5Rm9ySldU'
      access-token-validity-seconds: 3600
      refresh-token-validity-seconds: 1209600
    cookie:
      secure: false
      same-site: Lax
  upload:
    root-path: uploads
  fastapi:
    base-url: http://localhost:8000
    service-key: change-me
    caller-service: spring-backend

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n"
    #file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n"